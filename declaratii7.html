<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vrei claritate în taxe? Alege FocusTax – Ghid complet al declarațiilor fiscale din România."
    />
    <title>FocusTax | Claritate în taxe</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans&family=Dancing+Script:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      /* Reset & General */
      body {
        margin: 0;
        font-family: "Open Sans", sans-serif;
        background-color: #0f172a; /* Albastru închis (Navy) */
        color: #ffffff;
        overflow-x: hidden;
      }

      /* HEADER / NAVBAR */
      .navbar-area {
        background-color: #0f172a;
        position: sticky;
        top: 0;
        width: 100%;
        z-index: 999;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .navbar-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .navbar-logo {
        font-family: "Montserrat", sans-serif;
        font-size: 1.8rem;
        font-weight: 700;
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-decoration: none;
      }

      .navbar-logo span {
        color: #e9c46a; /* Auriu */
      }

      .navbar-menu {
        display: flex;
        gap: 2rem;
      }

      .navbar-menu a {
        font-size: 0.9rem;
        text-transform: uppercase;
        color: #ffffff;
        text-decoration: none;
        letter-spacing: 1px;
        transition: color 0.3s ease;
        font-weight: 600;
      }

      .navbar-menu a:hover {
        color: #e9c46a;
      }

      .navbar-right button {
        background-color: transparent;
        border: 1px solid #e9c46a;
        color: #e9c46a;
        font-weight: 600;
        padding: 6px 16px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.3s;
      }

      .navbar-right button:hover {
        background-color: #e9c46a;
        color: #0f172a;
      }

      /* HERO SECTION */
      .hero {
        height: 90vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 0 20px;
      }

      .hero h1 {
        font-family: "Montserrat", sans-serif;
        font-size: 4rem; /* Dimensiune mare pentru impact */
        font-weight: 700;
        line-height: 1.1;
        margin-bottom: 10px;
        animation: fadeInUp 1s ease-out;
      }

      /* Fontul "Your Wealth" (Script Style) */
      .wealth-style {
        font-family: "Dancing Script", cursive;
        color: #e9c46a;
        text-transform: none; /* Important pentru fonturile cursive */
        display: block;
        font-size: 1.2em;
        margin-top: 10px;
        letter-spacing: 0;
      }

      .hero p {
        font-size: 1.2rem;
        color: rgba(255, 255, 255, 0.8);
        max-width: 600px;
        margin-top: 20px;
        animation: fadeInUp 1.5s ease-out;
      }

      /* Animație simplă pentru text */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        .navbar-menu,
        .navbar-right {
          display: none; /* Ascundem elementele pe mobil pentru simplitate */
        }
        .hero h1 {
          font-size: 2.5rem;
        }
        .wealth-style {
          font-size: 1.1em;
        }
      }

      /* FOOTER */
      footer {
        text-align: center;
        padding: 40px 0;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.5);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>

  <body>
    <header class="navbar-area">
      <div class="navbar-container">
        <a href="#" class="navbar-logo">Focus<span>Tax</span></a>
        <nav class="navbar-menu">
          <a href="#">Acasă</a>
          <a href="#">Declarații</a>
          <a href="#">Ghiduri</a>
          <a href="#">Noutăți</a>
          <a href="#">Contact</a>
        </nav>
        <div class="navbar-right">
          <button>Căutare 🔎</button>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <h1>
          Vrei claritate în taxe?
          <span class="wealth-style">FocusTax</span>
        </h1>
        <p>
          Expertiza de care ai nevoie pentru a naviga cu încredere prin
          legislația fiscală din România.
        </p>
      </section>
    </main>

    <footer>
      <div class="container">
        © 2024 FocusTax.ro — Claritate fiscală și profesionalism
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
